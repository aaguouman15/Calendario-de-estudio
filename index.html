<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repaso Mensual — Anestesiología (v2)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080d12; --surf:#0e1620; --surf2:#162030; --surf3:#1c2a3a;
  --border:#1a2a3a; --border2:#223344;
  --accent:#00c8ff; --accent2:#00ff9d;
  --warn:#ffb800; --danger:#ff3d3d;
  --text:#ddeeff; --text2:#7a9ab8; --text3:#3d5a75;
  --mono:'JetBrains Mono',monospace; --sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;overflow-x:hidden}

header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0a1118 0%,rgba(10,17,24,.92) 100%);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:.5px}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.spacer{flex:1}
.month-nav{display:flex;align-items:center;gap:10px}
.nav-btn{background:var(--surf2);border:1px solid var(--border2);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.month-label{font-family:var(--mono);font-weight:600;font-size:15px;min-width:200px;text-align:center}
.today-btn{padding:6px 14px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:var(--mono);font-weight:600;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.today-btn:hover{filter:brightness(1.1)}

main{max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 380px;gap:20px}
@media (max-width:980px){main{grid-template-columns:1fr}}

.cal-wrap{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:14px}
.cal-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px;font-family:var(--mono);color:var(--text2);flex-wrap:wrap;gap:8px}
.progress-bar{flex:1;max-width:200px;height:6px;background:var(--surf3);border-radius:3px;overflow:hidden;margin:0 10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow-header{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;padding:6px 0;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.cal-cell{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:6px;min-height:90px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden}
.cal-cell:hover{border-color:var(--accent);transform:translateY(-1px)}
.cal-cell.empty{background:transparent;border:1px dashed var(--border);cursor:default;opacity:.3}
.cal-cell.empty:hover{transform:none;border-color:var(--border)}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 16px rgba(0,200,255,.25)}
.cal-cell.done{background:rgba(0,255,157,.06);border-color:var(--accent2)}
.cal-cell.past:not(.done){opacity:.55}
.cal-cell.selected{background:var(--surf3);border-color:var(--accent)}

.cell-date{font-family:var(--mono);font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.cell-day-of-cycle{font-size:9px;color:var(--text3);font-weight:400}
.cell-topics{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.cell-topic{font-size:9px;color:var(--text2);line-height:1.2;display:flex;gap:3px;align-items:flex-start}
.cell-topic .modtag{font-family:var(--mono);font-weight:600;flex-shrink:0;font-size:8px}
.cell-topic-text{overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.check-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent2);color:var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* Detail panel */
.detail{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:20px;position:sticky;top:90px;align-self:start}
.detail-empty{text-align:center;padding:40px 20px;color:var(--text2)}
.detail-date{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--accent);margin-bottom:4px}
.detail-cycle{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:18px}
.detail-topics{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.topic-row{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px}
.topic-mod{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:14px;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.topic-mod .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.topic-title{font-size:14px;font-weight:500;line-height:1.35}
.topic-note-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.note-status{font-family:var(--mono);font-size:9px;color:var(--text3);font-style:italic;text-transform:none;letter-spacing:0}
.note-status.saved{color:var(--accent2)}
.note-status.saving{color:var(--warn)}
.topic-note{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:6px;font-family:var(--sans);font-size:12px;line-height:1.4;resize:vertical;min-height:60px;transition:border-color .12s}
.topic-note:focus{outline:none;border-color:var(--accent)}
.topic-note::placeholder{color:var(--text3);font-style:italic}
.note-dot{position:absolute;bottom:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--warn);box-shadow:0 0 4px var(--warn)}
.detail-actions{display:flex;flex-direction:column;gap:8px}
.btn-done{padding:11px;background:var(--accent2);color:var(--bg);border:none;border-radius:6px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:filter .12s}
.btn-done:hover{filter:brightness(1.1)}
.btn-undone{padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-family:var(--mono);font-weight:600;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.btn-undone:hover{border-color:var(--danger);color:var(--danger)}
.done-banner{padding:10px;background:rgba(0,255,157,.1);border:1px solid var(--accent2);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--accent2);text-align:center;margin-bottom:10px}

/* Stats */
.stats-row{display:flex;gap:8px;margin-top:14px}
.stat-mini{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.stat-mini-v{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent)}
.stat-mini-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-family:var(--mono);margin-top:2px}

footer{max-width:1400px;margin:0 auto;padding:16px 20px;text-align:center;color:var(--text3);font-size:11px;font-family:var(--mono)}
footer a{color:var(--text2);text-decoration:none;cursor:pointer}
footer a:hover{color:var(--danger)}

@media (max-width:640px){
  .header-inner{flex-direction:column;align-items:stretch}
  .month-label{min-width:auto;flex:1}
  .cal-cell{min-height:60px;padding:4px}
  .cell-topic{font-size:8px}
  .detail{position:static}
}
</style>
</head>

    </div>
    <div class="cal-grid" id="cal-grid" style="margin-top:4px"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-empty">Seleccioná un día del calendario para ver los temas</div>
  </div>
</main>

<footer>
  <span id="footer-stats"></span> · <a id="reset-link">Reiniciar progreso</a>
</footer>

}],[{"m":"M4","t":"Complicaciones en regional"},{"m":"M11","t":"Cuerpo extraño en VA"},{"m":"M12","t":"Hipertensión pulmonar perioperatoria"}],[{"m":"M11","t":"NORA pediátrico"},{"m":"M12","t":"IC derecha y HTP"},{"m":"M11","t":"Masa mediastinal anterior"}],[{"m":"M12","t":"Tamponade y pericardio"},{"m":"M11","t":"Síndrome de Down y autismo"},{"m":"M12","t":"Trasplante cardíaco"}],[{"m":"M11","t":"Parálisis cerebral"},{"m":"M12","t":"Cirugía no cardíaca en cardiópata"},{"m":"M11","t":"Apnea del prematuro postop"}]]};
const MODULES = DATA.modules;
const SCHEDULE = DATA.schedule;       // array de días, cada uno con 3 temas
const CYCLE = SCHEDULE.length;        // 99
const MOD = Object.fromEntries(MODULES.map(m => [m.id, m]));

// Anchor: día 1 del ciclo = 1 de enero del año actual (fijo)
// Para cualquier fecha, dayOfCycle = ((dayOfYear - 1) + offset) % CYCLE
// Para que no se mueva si el año cambia, usamos un anchor absoluto.
const ANCHOR_DATE = '2026-01-01';     // día de ciclo = 1

const STORE_KEY = 'repaso-mes-v1';

// ────── STORAGE ──────
async function load() {
  if (window.storage?.get) {
    try { const r = await window.storage.get(STORE_KEY); if (r?.value) return JSON.parse(r.value); } catch(e){}
  }
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { done: {}, notes: {} };  // done: { 'YYYY-MM-DD': true }, notes: { 'topic_title': 'text' }
}
async function save(s) {
  const json = JSON.stringify(s);
  if (window.storage?.set) { try { await window.storage.set(STORE_KEY, json); return; } catch(e){} }
  try { localStorage.setItem(STORE_KEY, json); } catch(e){}
}

// ────── DATE UTILS ──────
function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseYmd(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}
function dayOfCycle(dateStr) {
  const diff = daysBetween(parseYmd(ANCHOR_DATE), parseYmd(dateStr));
  return ((diff % CYCLE) + CYCLE) % CYCLE;  // 0..98
}
function todayStr() { return ymd(new Date()); }

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ────── STATE ──────
let state = { done: {} };
let viewYear, viewMonth;       // mes mostrado
let selectedDate = null;       // fecha seleccionada para detalle

// ────── RENDER CALENDAR ──────
function renderCalendar() {
  document.getElementById('month-label').textContent = MONTHS[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day 1 of month — adjust to Monday-start
  const first = new Date(viewYear, viewMonth, 1);
  let startDow = first.getDay();      // 0=Sun..6=Sat
  let padStart = (startDow + 6) % 7;  // Mon=0
  for (let i = 0; i < padStart; i++) {
    const e = document.createElement('div');
    e.className = 'cal-cell empty';
    grid.appendChild(e);
  }

  const lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
  const today = todayStr();
  for (let d = 1; d <= lastDay; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const ds = ymd(date);
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (ds === today) cell.classList.add('today');
    if (state.done[ds]) cell.classList.add('done');
    if (ds < today && !state.done[ds]) cell.classList.add('past');
    if (ds === selectedDate) cell.classList.add('selected');

    const cyc = dayOfCycle(ds);
    const topics = SCHEDULE[cyc];

    const isDone = !!state.done[ds];
    const hasNotes = topics.some(t => state.notes[t.t] && state.notes[t.t].trim().length > 0);
    const topicsHTML = topics.map(t => {
      const m = MOD[t.m];
      return `<div class="cell-topic">
        <span class="modtag" style="color:${m.color}">${m.id}</span>
        <span class="cell-topic-text">${t.t}</span>
      </div>`;
    }).join('');

    cell.innerHTML = `
      ${isDone ? '<div class="check-badge">✓</div>' : ''}
      ${hasNotes && !isDone ? '<div class="note-dot" title="Tenés notas en algún tema"></div>' : ''}
      <div class="cell-date">
        <span>${d}</span>
        <span class="cell-day-of-cycle">#${cyc+1}</span>
      </div>
      <div class="cell-topics">${topicsHTML}</div>
    `;
    cell.addEventListener('click', () => selectDate(ds));
    grid.appendChild(cell);
  }

  updateStats();
}

// ────── DETAIL PANEL ──────
function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
  renderDetail();
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (!selectedDate) {
    el.innerHTML = '<div class="detail-empty">Seleccioná un día del calendario para ver los temas</div>';
    return;
  }
  const cyc = dayOfCycle(selectedDate);
  const topics = SCHEDULE[cyc];
  const isDone = !!state.done[selectedDate];
  const d = parseYmd(selectedDate);
  const dowNames = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const dateLabel = dowNames[d.getDay()] + ' ' + d.getDate() + ' de ' + MONTHS[d.getMonth()].toLowerCase();

  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const topicsHTML = topics.map((t, idx) => {
    const m = MOD[t.m];
    const existingNote = state.notes[t.t] || '';
    return `<div class="topic-row">
      <div class="topic-mod" style="border:1px solid ${m.color};color:${m.color};background:${m.color}1a">
        <span class="dot"></span>${m.id} · ${m.name}
      </div>
      <div class="topic-title">${t.t}</div>
      <div class="topic-note-label">
        <span>Mi progreso / dónde quedé</span>
        <span class="note-status" id="note-status-${idx}">${existingNote ? 'guardado' : ''}</span>
      </div>
      <textarea class="topic-note" id="note-${idx}" data-topic="${escHtml(t.t)}"
        placeholder="Ej: leí páginas 340-360 del Miller. Falta cuadro de dosis. Sigue por acá la próxima vez.">${escHtml(existingNote)}</textarea>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="detail-date">${dateLabel}</div>
    <div class="detail-cycle">Día #${cyc+1} del ciclo de 99 días</div>
    ${isDone ? '<div class="done-banner">✓ Marcado como completado</div>' : ''}
    <div class="detail-topics">${topicsHTML}</div>
    <div class="detail-actions">
      ${isDone
        ? '<button class="btn-undone" id="btn-toggle">Desmarcar</button>'
        : '<button class="btn-done" id="btn-toggle">Marcar como hecho</button>'}
    </div>
  `;

  document.getElementById('btn-toggle').addEventListener('click', async () => {
    if (state.done[selectedDate]) delete state.done[selectedDate];
    else state.done[selectedDate] = true;
    await save(state);
    renderCalendar();
    renderDetail();
  });

  // Bind textareas with debounced autosave
  topics.forEach((t, idx) => {
    const ta = document.getElementById(`note-${idx}`);
    const status = document.getElementById(`note-status-${idx}`);
    let timer = null;
    ta.addEventListener('input', () => {
      status.textContent = 'escribiendo…';
      status.className = 'note-status saving';
      if (timer) clearTimeout(timer);
      timer = setTimeout(async () => {
        const val = ta.value.trim();
        if (val) state.notes[t.t] = val;
        else delete state.notes[t.t];
        await save(state);
        status.textContent = val ? 'guardado' : '';
        status.className = 'note-status saved';
        // refresh calendar for note-dot indicator
        renderCalendar();
      }, 500);
    });
  });
}

// ────── STATS ──────
function updateStats() {
  // Days done this month
  const lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
  let doneInMonth = 0;
  let pastInMonth = 0;
  const today = todayStr();
  for (let d = 1; d <= lastDay; d++) {
    const ds = ymd(new Date(viewYear, viewMonth, d));
    if (ds <= today) pastInMonth++;
    if (state.done[ds]) doneInMonth++;
  }
  document.getElementById('progress-fill').style.width = (pastInMonth ? (doneInMonth/pastInMonth*100) : 0) + '%';
  document.getElementById('progress-text').textContent = `${doneInMonth} / ${pastInMonth} días`;

  // Footer total
  const totalDone = Object.keys(state.done).length;
  const totalNotes = Object.keys(state.notes || {}).length;
  document.getElementById('footer-stats').textContent =
    `${totalDone} días completados · ${totalNotes} temas con notas · ${Math.round(totalDone/CYCLE*100)}% del primer ciclo`;
}

// ────── NAV ──────
function gotoMonth(y, m) {
  viewYear = y; viewMonth = m;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
}

document.getElementById('prev-month').addEventListener('click', () => gotoMonth(viewYear, viewMonth-1));
document.getElementById('next-month').addEventListener('click', () => gotoMonth(viewYear, viewMonth+1));
document.getElementById('today-btn').addEventListener('click', () => {
  const d = new Date();
  gotoMonth(d.getFullYear(), d.getMonth());
  selectDate(todayStr());
});
document.getElementById('reset-link').addEventListener('click', async () => {
  const opt = prompt('Qué querés reiniciar?\n\n1 = Solo días marcados (mantener notas)\n2 = Solo notas (mantener días marcados)\n3 = Todo\n\nEscribí 1, 2 o 3 (o cancelá):');
  if (!opt) return;
  if (opt === '1') { state.done = {}; }
  else if (opt === '2') { state.notes = {}; }
  else if (opt === '3') { state.done = {}; state.notes = {}; }
  else { alert('Opción inválida'); return; }
  await save(state);
  renderCalendar();
  renderDetail();
});

// ────── INIT ──────
async function init() {
  state = await load();
  if (!state.done) state.done = {};
  if (!state.notes) state.notes = {};
  const d = new Date();
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();
  selectedDate = todayStr();
  renderCalendar();
  renderDetail();
}
init();
</script>
